<!doctype html>
<html lang="en" class="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ripsynss</title>
  <link rel="icon" href="/icon/syn.webp" />
  <svg xmlns="http://www.w3.org/2000/svg" width="0" height="0" style="position:absolute">
    <filter id="liquid-glass-distortion">

      <feTurbulence type="fractalNoise" baseFrequency="0.008 0.012" numOctaves="3" seed="8" result="noise" />

      <feGaussianBlur in="noise" stdDeviation="2" result="softNoise" />

      <feDisplacementMap in="SourceGraphic" in2="softNoise" scale="35" xChannelSelector="R" yChannelSelector="G" />

    </filter>
  </svg>
</head>

<body>
  <div id="root" class="bg-black dark:bg-white"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
